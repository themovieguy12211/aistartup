<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#0f0f14;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0f0f14;padding:40px 0">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background:#16161e;border:1px solid #2a2a3a;border-radius:10px;overflow:hidden">
          <tr>
            <td style="padding:32px 32px 8px">
              <div style="font-size:20px;font-weight:600;color:#f0f0f3;text-align:center">DagrAI</div>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 24px;text-align:center">
              <p style="font-size:18px;font-weight:500;color:#f0f0f3;margin:0 0 12px">You've been invited</p>
              <p style="font-size:15px;color:#a0a0b0;line-height:1.6;margin:0">
                You've been invited to join DagrAI. Click below to create your account.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 24px;text-align:center">
              <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=invite" style="display:inline-block;background:#8b5cf6;color:#fff;text-decoration:none;padding:12px 32px;border-radius:6px;font-size:15px;font-weight:500">Accept Invite</a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 32px;text-align:center">
              <p style="font-size:13px;color:#6b6b80;margin:0">
                This invitation expires in 7 days.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
